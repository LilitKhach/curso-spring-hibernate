name: Cerrar PRs Automaticamente

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  cerrar-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Comentar y cerrar PR
        uses: actions/github-script@v7
        with:
          script: |
            const mensaje = `
            ## Este repositorio NO acepta Pull Requests

            Hola @${context.payload.pull_request.user.login},

            Este repositorio usa un **sistema de evaluacion por PROMPTS**, no Pull Requests.

            ### Como entregar tu trabajo:

            1. **Trabaja en TU fork** (tu copia del repositorio)
            2. **Documenta tus prompts** en el archivo \`PROMPTS.md\`
            3. **Sube con \`git push\`** a tu fork
            4. **Listo!** El profesor revisa tu fork directamente

            ### Recursos:

            - [Como hacer fork y clonar](https://github.com/TodoEconometria/curso-spring-hibernate/blob/main/docs/git-github/fork-clone.md)
            - [Guia de entregas](https://github.com/TodoEconometria/curso-spring-hibernate/blob/main/entregas/README.md)

            ---

            *Este PR sera cerrado automaticamente.*
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: mensaje
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: 'closed'
            });
